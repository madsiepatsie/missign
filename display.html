<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Missign Display</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .screen {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
    }
    .label {
      background: #ff3b3b;
      color: white;
      font-size: 2rem;
      font-weight: bold;
      padding: 10px 40px;
      border-radius: 8px;
      margin-bottom: 30px;
      letter-spacing: 4px;
    }
    .photo {
      width: 300px;
      height: 300px;
      object-fit: cover;
      border-radius: 12px;
      margin-bottom: 30px;
      border: 4px solid white;
    }
    .no-photo {
      width: 300px;
      height: 300px;
      background: #222;
      border-radius: 12px;
      margin-bottom: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
    }
    .name {
      font-size: 3rem;
      font-weight: bold;
      margin-bottom: 10px;
    }
    .type {
      font-size: 1.5rem;
      color: #aaa;
      margin-bottom: 20px;
    }
    .description {
      font-size: 1.2rem;
      max-width: 600px;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    .contact {
      font-size: 2rem;
      font-weight: bold;
      color: #ffdd00;
    }
    .no-ads {
      font-size: 2rem;
      color: #555;
    }
    .branding {
      position: fixed;
      bottom: 20px;
      right: 30px;
      font-size: 1rem;
      color: #333;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<div class="screen" id="screen">
  <div class="no-ads">Loading...</div>
</div>

<div class="branding">MISSIGN</div>

<script>
  const SUPABASE_URL = 'https://oghquovomayveqmgdtgc.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_hBgiydGxVH2CPankB16S5Q_6n5Bz5Cn';

  let currentIndex = 0;
  let ads = [];

  function getDistanceKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  async function fetchAds() {
    try {
      const screenRes = await fetch(`${SUPABASE_URL}/rest/v1/screens?name=eq.screen1`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      });
      const screens = await screenRes.json();
      const screen = screens[0];
      if (!screen) { document.title = 'no screen found'; showNoAds(); return; }
      document.title = 'screen ok';

      const allAdsRes = await fetch(`${SUPABASE_URL}/rest/v1/ads?status=eq.active&order=created_at.desc`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      });
      const allAds = await allAdsRes.json();
      document.title = 'ads ok: ' + allAds.length;
      ads = allAds.filter(ad => {
        if (!ad.lat || !ad.lng) return true;
        const d = getDistanceKm(screen.lat, screen.lng, ad.lat, ad.lng);
        return d <= ad.radius;
      });
      if (ads.length === 0) showNoAds();
      else showAd(currentIndex % ads.length);
    } catch(e) {
      document.title = 'error: ' + e.message;
      showNoAds();
    }
  }

  function showAd(index) {
    const ad = ads[index];
    const emoji = ad.type === 'dog' ? '🐶' : ad.type === 'cat' ? '🐱' : '👤';
    document.getElementById('screen').innerHTML = `
      <div class="label">MISSING</div>
      ${ad.image_url
        ? `<img class="photo" src="${ad.image_url}" alt="${ad.name}" />`
        : `<div class="no-photo">${emoji}</div>`}
      <div class="name">${ad.name}</div>
      <div class="type">${ad.type.toUpperCase()}</div>
      <div class="description">${ad.description}</div>
      <div class="contact">📞 ${ad.contact}</div>
    `;
  }

  function showNoAds() {
    document.getElementById('screen').innerHTML = `
      <div class="no-ads">No active ads right now</div>
    `;
  }

  setInterval(() => {
    if (ads.length > 0) {
      currentIndex = (currentIndex + 1) % ads.length;
      showAd(currentIndex);
    }
  }, 10000);

  setInterval(fetchAds, 60000);

  fetchAds();
</script>
</body>
</html>
