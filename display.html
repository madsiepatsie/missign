<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Missign Display</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }
    .card {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: 100vh;
      width: 100vw;
      animation: fadeIn 0.8s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: scale(1.02); }
      to { opacity: 1; transform: scale(1); }
    }
    .photo-side {
      position: relative;
      overflow: hidden;
      background: #111;
    }
    .photo-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10rem;
      background: #151515;
    }
    .missing-tape {
      position: absolute;
      top: 48px;
      left: -10px;
      background: #ff2323;
      color: white;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.8rem;
      letter-spacing: 8px;
      padding: 10px 40px 10px 20px;
      clip-path: polygon(0 0, 100% 0, 96% 100%, 0 100%);
      z-index: 10;
    }
    .photo-overlay {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(to top, #0a0a0a, transparent);
    }
    .info-side {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 50px;
      background: #0a0a0a;
      position: relative;
    }
    .type-tag {
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 4px;
      color: #ff2323;
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 6rem;
      line-height: 0.9;
      color: #fff;
      margin-bottom: 24px;
      word-break: break-word;
    }
    .divider {
      width: 60px;
      height: 3px;
      background: #ff2323;
      margin-bottom: 28px;
    }
    .description {
      font-size: 1.15rem;
      line-height: 1.7;
      color: #bbb;
      margin-bottom: 40px;
      max-height: 180px;
      overflow: hidden;
    }
    .contact-label {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: #555;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .contact {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 3rem;
      color: #ffdd00;
      letter-spacing: 3px;
    }
    .branding {
      position: absolute;
      bottom: 28px;
      right: 36px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 6px;
      color: #222;
    }
    .no-ads-screen {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
    }
    .no-ads-screen .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 4rem;
      letter-spacing: 10px;
      color: #1a1a1a;
    }
    .no-ads-screen .sub {
      font-size: 0.85rem;
      color: #2a2a2a;
      letter-spacing: 3px;
      margin-top: 12px;
    }
    .live-dot {
      position: absolute;
      top: 28px;
      right: 36px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.7rem;
      letter-spacing: 2px;
      color: #333;
    }
    .live-dot::before {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff2323;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.8); }
    }
  </style>
</head>
<body>

<div id="root"></div>

<script>
  const SUPABASE_URL = 'https://oghquovomayveqmgdtgc.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_hBgiydGxVH2CPankB16S5Q_6n5Bz5Cn';

  let currentIndex = 0;
  let ads = [];

  function getDistanceKm(lat1, lng1, lat2, lng2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLng = (lng2 - lng1) * Math.PI / 180;
    const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
              Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
              Math.sin(dLng/2) * Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  async function fetchAds() {
    try {
      const screenRes = await fetch(SUPABASE_URL + '/rest/v1/screens?name=eq.screen1', {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
      });
      const screens = await screenRes.json();
      const screen = screens[0];
      if (!screen) { showNoAds(); return; }

      const allAdsRes = await fetch(SUPABASE_URL + '/rest/v1/ads?status=eq.active&order=created_at.desc', {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
      });
      const allAds = await allAdsRes.json();
      ads = allAds.filter(function(ad) {
        if (!ad.lat || !ad.lng) return true;
        const d = getDistanceKm(screen.lat, screen.lng, ad.lat, ad.lng);
        return d <= ad.radius;
      });
      if (ads.length === 0) showNoAds();
      else showAd(currentIndex % ads.length);
    } catch(e) {
      showNoAds();
    }
  }

  function showAd(index) {
    const ad = ads[index];
    const emoji = ad.type === 'dog' ? '🐶' : ad.type === 'cat' ? '🐱' : ad.type === 'human' ? '👤' : '❓';
    const typeLabel = ad.type === 'human' ? 'Missing Person' : 'Missing ' + ad.type.charAt(0).toUpperCase() + ad.type.slice(1);
    const photoHtml = ad.image_url
      ? '<img src="' + ad.image_url + '" alt="' + ad.name + '" />'
      : '<div class="photo-placeholder">' + emoji + '</div>';

    document.getElementById('root').innerHTML =
      '<div class="card">' +
        '<div class="photo-side">' +
          '<div class="missing-tape">MISSING</div>' +
          photoHtml +
          '<div class="photo-overlay"></div>' +
        '</div>' +
        '<div class="info-side">' +
          '<div class="live-dot">LIVE</div>' +
          '<div class="type-tag">' + typeLabel + '</div>' +
          '<div class="name">' + ad.name + '</div>' +
          '<div class="divider"></div>' +
          '<div class="description">' + (ad.description || 'No description provided.') + '</div>' +
          '<div class="contact-label">If found, please call</div>' +
          '<div class="contact">' + ad.contact + '</div>' +
          '<div class="branding">MISSIGN</div>' +
        '</div>' +
      '</div>';
  }

  function showNoAds() {
    document.getElementById('root').innerHTML =
      '<div class="no-ads-screen">' +
        '<div class="logo">MISSIGN</div>' +
        '<div class="sub">NO ACTIVE ADS</div>' +
      '</div>';
  }

  setInterval(function() {
    if (ads.length > 0) {
      currentIndex = (currentIndex + 1) % ads.length;
      showAd(currentIndex);
    }
  }, 10000);

  setInterval(fetchAds, 60000);
  fetchAds();
</script>
</body>
</html>
