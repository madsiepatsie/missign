<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black"/>
  <title>Missign Display</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Nunito', sans-serif;
      background: #0a0a0a;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .card {
      display: grid;
      grid-template-columns: 58% 42%;
      height: 100vh;
      width: 100vw;
      animation: fadeIn 0.7s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(1.015); }
      to { opacity: 1; transform: scale(1); }
    }

    /* LEFT — full bleed photo */
    .photo-side {
      position: relative;
      overflow: hidden;
      background: #111;
    }

    .photo-side img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #111;
    }

    .photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12rem;
      background: #151515;
    }

    /* RIGHT — info */
    .info-side {
      background: #f7f3ee;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 48px 44px;
      position: relative;
      gap: 18px;
    }

    .missing-badge {
      background: #ff4757;
      color: white;
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: 5px;
      padding: 12px 32px;
      border-radius: 50px;
      text-align: center;
      box-shadow: 0 6px 24px rgba(255,71,87,0.35);
      align-self: flex-start;
    }

    .type-tag {
      font-size: 0.9rem;
      font-weight: 800;
      letter-spacing: 3px;
      color: #aaa;
      text-transform: uppercase;
    }

    .name {
      font-size: 5.5rem;
      font-weight: 900;
      color: #1a1a2e;
      line-height: 0.95;
      word-break: break-word;
    }

    .divider {
      width: 56px;
      height: 4px;
      background: #ff4757;
      border-radius: 4px;
    }

    .description {
      font-size: 1.5rem;
      line-height: 1.6;
      color: #555;
      font-weight: 600;
    }

    .contact-label {
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 3px;
      color: #bbb;
      text-transform: uppercase;
    }

    .contact {
      font-size: 2.8rem;
      font-weight: 900;
      color: #1a1a2e;
      letter-spacing: 2px;
      padding-bottom: 14px;
      border-bottom: 4px solid #ff4757;
      display: inline-block;
    }

    .branding {
      position: absolute;
      bottom: 24px;
      right: 28px;
      font-size: 0.9rem;
      font-weight: 900;
      letter-spacing: 6px;
      color: #ddd;
    }

    .live-indicator {
      position: absolute;
      top: 22px;
      right: 28px;
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.75rem;
      font-weight: 800;
      letter-spacing: 2px;
      color: #ccc;
    }

    .live-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #ff4757;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }

    .no-ads-screen {
      height: 100vh;
      width: 100vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      gap: 16px;
    }

    .no-ads-screen .logo {
      font-size: 5rem;
      font-weight: 900;
      letter-spacing: 12px;
      color: #2a2a4e;
    }

    .no-ads-screen .sub {
      font-size: 1rem;
      color: #2a2a4e;
      letter-spacing: 4px;
      font-weight: 700;
    }
  </style>
</head>
<body>
<div id="root"></div>
<script>
  const SUPABASE_URL = 'https://oghquovomayveqmgdtgc.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_hBgiydGxVH2CPankB16S5Q_6n5Bz5Cn';

  const MAX_NAME = 24;
  const MAX_DESC = 120;
  const MAX_CONTACT = 20;

  let currentIndex = 0;
  let ads = [];

  function cap(str, max) {
    if (!str) return '';
    return str.length > max ? str.substring(0, max) + '…' : str;
  }

  function getDistanceKm(lat1, lng1, lat2, lng2) {
    var R = 6371, dLat = (lat2-lat1)*Math.PI/180, dLng = (lng2-lng1)*Math.PI/180;
    var a = Math.sin(dLat/2)*Math.sin(dLat/2) +
            Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  async function fetchAds() {
    try {
      var screenRes = await fetch(SUPABASE_URL + '/rest/v1/screens?name=eq.screen1', {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
      });
      var screens = await screenRes.json();
      var screen = screens[0];
      if (!screen) { showNoAds(); return; }

      var now = new Date().toISOString();
      var allAdsRes = await fetch(SUPABASE_URL + '/rest/v1/ads?status=eq.active&expires_at=gte.' + now + '&order=created_at.desc', {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': 'Bearer ' + SUPABASE_ANON_KEY }
      });
      var allAds = await allAdsRes.json();
      ads = allAds.filter(function(ad) {
        if (!ad.lat || !ad.lng) return true;
        return getDistanceKm(screen.lat, screen.lng, ad.lat, ad.lng) <= ad.radius;
      });
      if (ads.length === 0) showNoAds();
      else showAd(currentIndex % ads.length);
    } catch(e) { showNoAds(); }
  }

  function showAd(i) {
    var ad = ads[i];
    var emoji = ad.type === 'dog' ? '🐶' : ad.type === 'cat' ? '🐱' : ad.type === 'human' ? '👤' : '❓';
    var typeLabel = ad.type === 'human' ? 'Vermiste persoon' : ad.type === 'dog' ? 'Vermiste hond' : ad.type === 'cat' ? 'Vermiste kat' : 'Vermist dier';
    var photoHtml = ad.image_url
      ? '<img src="' + ad.image_url + '" alt="foto" />'
      : '<div class="photo-placeholder">' + emoji + '</div>';

    document.getElementById('root').innerHTML =
      '<div class="card">' +
        '<div class="photo-side">' + photoHtml + '</div>' +
        '<div class="info-side">' +
          '<div class="live-indicator"><div class="live-dot"></div>LIVE</div>' +
          '<div class="missing-badge">VERMIST</div>' +
          '<div class="type-tag">' + typeLabel + '</div>' +
          '<div class="name">' + cap(ad.name, MAX_NAME) + '</div>' +
          '<div class="divider"></div>' +
          '<div class="description">' + cap(ad.description || 'Geen beschrijving opgegeven.', MAX_DESC) + '</div>' +
          '<div class="contact-label">Gezien? Bel direct</div>' +
          '<div class="contact">' + cap(ad.contact, MAX_CONTACT) + '</div>' +
          '<div class="branding">MISSIGN</div>' +
        '</div>' +
      '</div>';
  }

  function showNoAds() {
    document.getElementById('root').innerHTML =
      '<div class="no-ads-screen">' +
        '<div class="logo">MISSIGN</div>' +
        '<div class="sub">GEEN ACTIEVE ADVERTENTIES</div>' +
      '</div>';
  }

  setInterval(function() {
    if (ads.length > 0) { currentIndex = (currentIndex + 1) % ads.length; showAd(currentIndex); }
  }, 10000);
  setInterval(fetchAds, 60000);
  fetchAds();
</script>
</body>
</html>
